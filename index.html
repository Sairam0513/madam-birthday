<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Sri Lakshmi Madam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #fef5e7 0%, #fdebd0 50%, #f9e79f 100%);
            overflow-x: hidden;
            font-family: 'Arial', sans-serif;
            position: relative;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
                opacity: 0.6;
            }
            50% {
                transform: translateY(-30px) rotate(10deg);
                opacity: 0.8;
            }
        }

        @keyframes balloonFloat {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes shimmer {
            0%, 100% {
                opacity: 0.8;
            }
            50% {
                opacity: 1;
            }
        }

        .floating-element {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
        }

        .balloon {
            position: fixed;
            width: 30px;
            height: 40px;
            border-radius: 50% 50% 50% 0;
            animation: balloonFloat linear infinite;
            z-index: 1;
        }

        .heading {
            font-size: 48px;
            font-weight: bold;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            animation: bounce 2s ease-in-out infinite;
            margin: 20px 0;
            text-align: center;
        }

        .subheading {
            font-size: 20px;
            color: #c0732d;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        .header-section {
            text-align: center;
            padding-top: 60px;
            padding-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .typing-section {
            text-align: center;
            padding-bottom: 50px;
            position: relative;
            z-index: 10;
        }

        .typing-text {
            font-size: 24px;
            color: #8b5a3c;
            font-weight: 500;
            min-height: 40px;
            letter-spacing: 1px;
        }

        .typing-cursor {
            animation: shimmer 1s infinite;
            margin-left: 3px;
        }

        .media-section {
            padding-bottom: 100px;
            position: relative;
            z-index: 10;
        }

        .media-title {
            text-align: center;
            color: #8b5a3c;
            font-size: 24px;
            margin-bottom: 40px;
        }

        .media-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 0 15px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .media-card {
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .media-card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .media-card:hover img {
            transform: scale(1.08);
        }

        .media-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(212, 175, 55, 0.2);
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .media-card:hover .media-card-overlay {
            opacity: 1;
        }

        .play-icon {
            font-size: 40px;
            color: white;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .placeholder-card {
            width: 150px;
            height: 150px;
            border-radius: 12px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        @media (max-width: 768px) {
            .heading {
                font-size: 36px;
            }
            .subheading {
                font-size: 16px;
            }
            .typing-text {
                font-size: 18px;
            }
            .media-title {
                font-size: 20px;
            }
            .media-card img {
                width: 120px;
                height: 120px;
            }
            .placeholder-card {
                width: 120px;
                height: 120px;
            }
            .media-container {
                gap: 15px;
            }
        }

        @media (max-width: 480px) {
            .heading {
                font-size: 28px;
                padding: 0 15px;
            }
            .subheading {
                font-size: 14px;
            }
            .header-section {
                padding-top: 40px;
                padding-bottom: 30px;
            }
            .typing-section {
                padding-bottom: 30px;
            }
            .typing-text {
                font-size: 16px;
            }
            .media-title {
                font-size: 18px;
                padding: 0 15px;
                margin-bottom: 30px;
            }
            .media-section {
                padding-bottom: 60px;
            }
            .media-card img {
                width: 100px;
                height: 100px;
            }
            .placeholder-card {
                width: 100px;
                height: 100px;
            }
            .media-container {
                gap: 12px;
                padding: 0 10px;
            }
            .play-icon {
                font-size: 32px;
            }
        }

        /* MEDIA PLAYER - VERTICAL VIDEO POPUP STYLE */
        .media-player {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.98);
            padding: 0;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .media-player.active {
            display: flex;
        }

        .media-player-content {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        /* VERTICAL VIDEO (Instagram Reel Ratio) */
        .media-player video {
            width: auto;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            display: block;
            object-fit: contain;
        }

        /* AUDIO PLAYER */
        .media-player audio {
            width: 90%;
            max-width: 600px;
            margin: 0 auto;
            display: block;
            padding: 30px 20px;
        }

        /* CLOSE BUTTON */
        .close-media {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #d4af37;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            z-index: 101;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .close-media:hover {
            background: #c0732d;
            transform: scale(1.05);
        }

        /* LOADING INDICATOR */
        .media-loading {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 102;
            font-size: 14px;
            color: white;
        }

        .media-loading.show {
            display: block;
        }

        @media (max-width: 768px) {
            .close-media {
                top: 15px;
                right: 15px;
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        @media (max-width: 480px) {
            .close-media {
                top: 10px;
                right: 10px;
                padding: 8px 15px;
                font-size: 12px;
            }
            .media-player audio {
                width: 95%;
                padding: 20px 10px;
            }
            .media-player video {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Background Music -->
    <audio id="bgAudio" loop>
        <source src="" type="audio/mpeg">
    </audio>

    <!-- Floating Elements Container -->
    <div id="floatingContainer"></div>

    <!-- Balloons Container -->
    <div id="balloonsContainer"></div>

    <!-- Header Section -->
    <div class="header-section">
        <h1 class="heading">Happiest Birthday Sri Lakshmi Madam</h1>
        <p class="subheading">The best mentor ever</p>
    </div>

    <!-- Typing Effect Section -->
    <div class="typing-section">
        <div class="typing-text">
            <span id="typingText"></span><span class="typing-cursor">|</span>
        </div>
    </div>

    <!-- Media Cards Section -->
    <div class="media-section">
        <h2 class="media-title">A small tribute to our Madam</h2>
        <div class="media-container" id="mediaContainer"></div>
    </div>

    <!-- Media Player - Full Screen Popup -->
    <div class="media-player" id="mediaPlayer">
        <button class="close-media" onclick="closeMedia()">✕ Close</button>
        <div class="media-loading" id="mediaLoading">Loading...</div>
        <div class="media-player-content" id="mediaContent"></div>
    </div>

    <script>
        // ================================================================
        // 🎵 STEP 1: ADD YOUR BACKGROUND MUSIC FILE PATH HERE
        // ================================================================
        const backgroundMusicPath = 'Marandhu Poche on flute.mp3';
        // ================================================================

        // ================================================================
        // 🎨 STEP 2: ADD YOUR CARD IMAGES AND MEDIA HERE
        // ================================================================
        const mediaCards = [
            {
                image: 'image-removebg-preview.png',
                media: 'maYA.mp4',
                type: 'video'
            },
            {
                image: 'image-removebg-preview1.png',
                media: 'dp wish.mp4',
                type: 'video'
            },
            {
                image: '1.png',
                media: 'ram.mp4',
                type: 'video'
            },
            {
                image: '2.png',
                media: 'madam wish.mp3',
                type: 'audio'
            }
        ];
        // ================================================================

        // ================================================================
        // ✍️ STEP 3: CUSTOMIZE THE TYPING QUOTES (OPTIONAL)
        // ================================================================
        const quotes = [
            'The best mentor',
            'The greatest motivator',
            'Always supportive',
            'Inspiring us daily',
            'A true role model'
        ];
        // ================================================================

        // Typing Effect
        let currentQuoteIndex = 0;
        let charIndex = 0;

        function typeQuote() {
            const quote = quotes[currentQuoteIndex];
            const typingElement = document.getElementById('typingText');

            if (charIndex < quote.length) {
                typingElement.textContent += quote[charIndex];
                charIndex++;
                setTimeout(typeQuote, 80);
            } else {
                setTimeout(() => {
                    typingElement.textContent = '';
                    charIndex = 0;
                    currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
                    typeQuote();
                }, 2500);
            }
        }

        // Initialize Floating Elements
        function createFloatingElements() {
            const container = document.getElementById('floatingContainer');
            const emojis = ['🎉', '🎈', '❤️', '🎂', '🌹', '💝', '⭐', '🎁'];

            emojis.forEach((emoji, idx) => {
                const element = document.createElement('div');
                element.className = 'floating-element';
                element.textContent = emoji;
                element.style.left = Math.random() * 100 + '%';
                element.style.top = Math.random() * 100 + '%';
                element.style.animation = `float ${4 + Math.random() * 3}s ease-in infinite`;
                container.appendChild(element);
            });
        }

        // Initialize Balloons
        function createBalloons() {
            const container = document.getElementById('balloonsContainer');
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#95E1D3'];

            colors.forEach((color, idx) => {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.backgroundColor = color;
                balloon.style.left = (25 * idx + 10) + '%';
                balloon.style.animationDelay = (idx * 1.5) + 's';
                balloon.style.animationDuration = (8 + idx * 1.5) + 's';
                container.appendChild(balloon);
            });
        }

        // Create Media Cards
        function createMediaCards() {
            const container = document.getElementById('mediaContainer');
            container.innerHTML = '';
            
            mediaCards.forEach((card, idx) => {
                const cardDiv = document.createElement('div');
                
                if (card.image) {
                    cardDiv.className = 'media-card';
                    
                    const img = document.createElement('img');
                    img.src = card.image;
                    img.alt = 'Media content';
                    img.onerror = function() {
                        console.warn(`Image not found: ${card.image}`);
                    };
                    
                    const overlay = document.createElement('div');
                    overlay.className = 'media-card-overlay';
                    overlay.innerHTML = card.media ? '<span class="play-icon">▶</span>' : '<span class="play-icon">🖼️</span>';
                    
                    cardDiv.appendChild(img);
                    cardDiv.appendChild(overlay);
                    
                    if (card.media) {
                        cardDiv.style.cursor = 'pointer';
                        cardDiv.onclick = () => playMedia(idx);
                    }
                } else {
                    cardDiv.className = 'placeholder-card';
                    cardDiv.innerHTML = '<span style="font-size: 50px; opacity: 0.3;">📸</span>';
                }
                
                container.appendChild(cardDiv);
            });
        }

        // Play Media - Full Screen Popup with Auto-Close
        function playMedia(cardIndex) {
            const bgAudio = document.getElementById('bgAudio');
            bgAudio.pause();

            const mediaPlayer = document.getElementById('mediaPlayer');
            const mediaContent = document.getElementById('mediaContent');
            const mediaLoading = document.getElementById('mediaLoading');
            const card = mediaCards[cardIndex];

            mediaContent.innerHTML = '';
            mediaLoading.classList.add('show');

            if (card.type === 'audio') {
                const audio = document.createElement('audio');
                audio.controls = true;
                audio.autoplay = true;
                
                const source = document.createElement('source');
                source.src = card.media;
                source.type = 'audio/mpeg';
                audio.appendChild(source);
                
                audio.onerror = function() {
                    console.warn(`Audio not found: ${card.media}`);
                    mediaLoading.classList.remove('show');
                };
                
                // Auto-close after audio ends
                audio.onended = () => {
                    setTimeout(() => {
                        closeMedia();
                    }, 1000);
                };
                
                // Hide loading when audio is ready
                audio.oncanplay = () => {
                    mediaLoading.classList.remove('show');
                };
                
                mediaContent.appendChild(audio);
            } else if (card.type === 'video') {
                const video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                video.playsInline = true;
                
                const source = document.createElement('source');
                source.src = card.media;
                source.type = 'video/mp4';
                video.appendChild(source);
                
                video.onerror = function() {
                    console.warn(`Video not found: ${card.media}`);
                    mediaLoading.classList.remove('show');
                };
                
                // Auto-close after video ends (VERTICAL VIDEO POPUP)
                video.onended = () => {
                    setTimeout(() => {
                        closeMedia();
                    }, 500);
                };
                
                // Hide loading when video is ready to play
                video.oncanplay = () => {
                    mediaLoading.classList.remove('show');
                };
                
                mediaContent.appendChild(video);
            }

            mediaPlayer.classList.add('active');
        }

        // Close Media Popup
        function closeMedia() {
            const mediaPlayer = document.getElementById('mediaPlayer');
            const mediaLoading = document.getElementById('mediaLoading');
            mediaPlayer.classList.remove('active');
            mediaLoading.classList.remove('show');
            resumeBackground();
        }

        // Resume Background Music
        function resumeBackground() {
            const bgAudio = document.getElementById('bgAudio');
            bgAudio.play().catch(err => console.log('Audio play error:', err));
        }

        // Close popup on ESC key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const mediaPlayer = document.getElementById('mediaPlayer');
                if (mediaPlayer.classList.contains('active')) {
                    closeMedia();
                }
            }
        });

        // Initialize Background Music
        function initializeBackgroundMusic() {
            const bgAudio = document.getElementById('bgAudio');
            const sourceElement = bgAudio.querySelector('source');
            sourceElement.src = backgroundMusicPath;
            bgAudio.load();
            
            const playPromise = bgAudio.play();
            if (playPromise !== undefined) {
                playPromise
                    .then(() => {
                        console.log('Background music playing');
                    })
                    .catch(error => {
                        console.log('Autoplay blocked. Click anywhere to start music.');
                        document.addEventListener('click', () => {
                            bgAudio.play().catch(err => console.log('Play error:', err));
                        }, { once: true });
                    });
            }
        }

        // Initialize everything
        window.addEventListener('DOMContentLoaded', () => {
            createFloatingElements();
            createBalloons();
            createMediaCards();
            typeQuote();
            initializeBackgroundMusic();
        });
    </script>
</body>
</html>
